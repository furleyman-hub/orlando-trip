<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#e63946">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Orlando Trip 2026</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg: #0f1923;
      --bg2: #1a2535;
      --bg3: #243040;
      --accent: #e63946;
      --gold: #f4a300;
      --green: #2ecc71;
      --yellow: #f39c12;
      --red: #e74c3c;
      --text: #f0f0f0;
      --text2: #b0b8c8;
      --border: #2d3f55;
      --nav-h: 64px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      min-height: 100dvh;
    }

    /* ── HEADER ── */
    #app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 52px;
    }
    #app-header h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    #app-header h1 span { color: var(--accent); }
    .header-badge {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      color: var(--text2);
    }

    /* ── MAIN CONTENT ── */
    #view-root {
      padding: 12px 14px calc(var(--nav-h) + var(--safe-bottom) + 12px);
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── BOTTOM NAV ── */
    #bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--safe-bottom);
      height: calc(var(--nav-h) + var(--safe-bottom));
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      color: var(--text2);
      font-size: 10px;
      font-weight: 500;
      padding: 6px 0;
      cursor: pointer;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
      min-height: 48px;
    }
    .nav-btn svg { width: 22px; height: 22px; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn.active svg path, .nav-btn.active svg rect, .nav-btn.active svg circle,
    .nav-btn.active svg polyline, .nav-btn.active svg polygon { stroke: var(--accent); }

    /* ── CARDS ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text2);
      margin-bottom: 8px;
    }

    /* ── SUB NAV ── */
    .sub-nav {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 10px 0 6px;
      margin-bottom: 4px;
      scrollbar-width: none;
    }
    .sub-nav::-webkit-scrollbar { display: none; }
    .sub-btn {
      flex-shrink: 0;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text2);
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
    }
    .sub-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── SECTION VISIBILITY ── */
    .tab-view { display: none; }
    .tab-view.active { display: block; }
    .sub-view { display: none; }
    .sub-view.active { display: block; }

    /* ── BADGES ── */
    .badge {
      display: inline-block;
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-ok { background: rgba(46,204,113,0.2); color: var(--green); border: 1px solid var(--green); }
    .badge-warn { background: rgba(243,156,18,0.2); color: var(--yellow); border: 1px solid var(--yellow); }
    .badge-danger { background: rgba(231,76,60,0.2); color: var(--red); border: 1px solid var(--red); }
    .badge-perk { background: rgba(244,163,0,0.2); color: var(--gold); border: 1px solid var(--gold); }
    .badge-conf { background: rgba(46,204,113,0.15); color: var(--green); border: 1px solid rgba(46,204,113,0.4); }
    .badge-gray { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }

    /* ── TABLES ── */
    .table-wrap { overflow-x: auto; margin: 8px 0; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 280px; }
    th {
      background: var(--bg3);
      color: var(--text2);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 8px 10px;
      text-align: left;
    }
    td { padding: 9px 10px; border-top: 1px solid var(--border); vertical-align: top; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* ── DETAIL ELEMENTS ── */
    details { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
    details[open] { background: var(--bg2); }
    summary {
      list-style: none;
      padding: 13px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-weight: 600;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    summary::-webkit-details-marker { display: none; }
    summary::after {
      content: "›";
      font-size: 18px;
      color: var(--text2);
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    details[open] summary::after { transform: rotate(90deg); }
    .details-body { padding: 0 14px 14px; }

    /* ── SCHEDULE LIST ── */
    .schedule-list { list-style: none; }
    .schedule-list li {
      display: flex;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .schedule-list li:last-child { border-bottom: none; }
    .schedule-time {
      flex-shrink: 0;
      width: 72px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 600;
      padding-top: 1px;
    }

    /* ── MUST-DOS ── */
    .must-do-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .must-do-chip {
      background: rgba(230,57,70,0.2);
      border: 1px solid rgba(230,57,70,0.5);
      color: #f08090;
      border-radius: 16px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .nice-chip {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 16px;
      padding: 3px 10px;
      font-size: 12px;
    }

    /* ── CALLOUT ── */
    .callout {
      border-radius: 8px;
      padding: 10px 12px;
      margin: 8px 0;
      font-size: 13px;
      line-height: 1.5;
    }
    .callout-warn { background: rgba(243,156,18,0.12); border-left: 3px solid var(--yellow); }
    .callout-danger { background: rgba(231,76,60,0.12); border-left: 3px solid var(--red); }
    .callout-info { background: rgba(52,152,219,0.12); border-left: 3px solid #3498db; }
    .callout-success { background: rgba(46,204,113,0.12); border-left: 3px solid var(--green); }

    /* ── CONF NUMBER ── */
    .conf-number {
      font-family: 'Courier New', monospace;
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 2px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .conf-copy-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      color: var(--text2);
      cursor: pointer;
      font-family: system-ui, sans-serif;
    }

    /* ── HOME TAB ── */
    .trip-hero {
      background: linear-gradient(135deg, #1a2535 0%, #0f1923 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 10px;
      text-align: center;
    }
    .trip-hero h2 { font-size: 20px; margin-bottom: 4px; }
    .trip-hero .trip-dates { color: var(--text2); font-size: 13px; margin-bottom: 12px; }
    .countdown-badge {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      border-radius: 24px;
      padding: 6px 18px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .quick-links {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }
    .quick-link-btn {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 6px;
      text-align: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .quick-link-btn .ql-icon { font-size: 22px; }
    .quick-link-btn:active { background: var(--bg3); }

    /* ── CHECKLIST ── */
    .checklist { list-style: none; }
    .checklist li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .checklist li:last-child { border-bottom: none; }
    .checklist li.done .check-label { text-decoration: line-through; color: var(--text2); opacity: 0.6; }
    .check-input {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: var(--accent);
      margin-top: 2px;
    }
    .check-label { font-size: 14px; line-height: 1.4; cursor: pointer; }

    /* ── FAMILY ── */
    .family-table td:first-child { font-weight: 600; white-space: nowrap; }
    .chill-rule {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .chill-rule:last-child { border-bottom: none; }
    .rule-num {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      background: var(--accent);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
    }
    .rule-title { font-weight: 700; margin-bottom: 2px; }

    /* ── PERKS TABLE ── */
    .perk-yes { color: var(--green); font-weight: 600; }
    .perk-no { color: var(--text2); }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #333;
      color: #fff;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── MISC ── */
    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin: 4px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    ul.tip-list { list-style: none; }
    ul.tip-list li {
      padding: 7px 0 7px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      position: relative;
      line-height: 1.4;
    }
    ul.tip-list li:last-child { border-bottom: none; }
    ul.tip-list li::before { content: "•"; position: absolute; left: 0; color: var(--accent); }
    .label-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .day-park { font-size: 12px; color: var(--text2); }
    .row-flex { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; }

    /* ── SCHEDULE DONE STATE ── */
    .schedule-done { text-decoration: line-through; opacity: 0.4; }
    .schedule-list li { cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
    .schedule-list li:active { background: rgba(255,255,255,0.04); border-radius: 4px; }

    /* ── EXPENSE TRACKER ── */
    .expense-input-row {
      display: flex;
      gap: 8px;
      margin: 10px 0;
      align-items: center;
    }
    .expense-input-row input[type="text"] {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
    }
    .expense-input-row input[type="text"]:focus { border-color: var(--accent); }
    .expense-amount-wrap {
      display: flex;
      align-items: center;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 10px;
      flex-shrink: 0;
      width: 100px;
    }
    .expense-amount-wrap span { color: var(--text2); font-size: 14px; margin-right: 2px; }
    .expense-amount-wrap input[type="number"] {
      background: none;
      border: none;
      color: var(--text);
      font-size: 14px;
      width: 70px;
      padding: 9px 0;
      outline: none;
    }
    .expense-add-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 9px 16px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .expense-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .expense-item:last-child { border-bottom: none; }
    .expense-item-desc { flex: 1; }
    .expense-item-amt { color: var(--gold); font-weight: 600; flex-shrink: 0; }
    .expense-del-btn {
      background: none;
      border: none;
      color: var(--text2);
      font-size: 16px;
      cursor: pointer;
      padding: 0 4px;
      flex-shrink: 0;
      line-height: 1;
    }
    .expense-del-btn:hover { color: var(--red); }
    .expense-total {
      font-size: 18px;
      font-weight: 700;
      color: var(--green);
      margin-top: 4px;
    }
  </style>
</head>
<body>

<header id="app-header">
  <h1>🎢 <span>Orlando</span> Trip 2026</h1>
  <div class="header-badge" id="header-badge">May 21–25</div>
</header>

<main id="view-root">

  <!-- ═══════ HOME TAB ═══════ -->
  <div class="tab-view active" id="tab-home">
    <div class="trip-hero">
      <h2>Fox Family · Universal Orlando</h2>
      <div class="trip-dates">May 21–25, 2026 · Memorial Day Weekend</div>
      <div class="countdown-badge" id="countdown-text">Loading…</div>
    </div>

    <div class="card-title" style="margin-bottom:6px;">Quick Access</div>
    <div class="quick-links" id="quick-links"></div>

    <div id="today-card"></div>

    <div class="card">
      <div class="card-title">The Family</div>
      <div style="font-size:14px;">
        <div style="padding:4px 0;">👨 <strong>Julian</strong> — Dad / Trip Planner</div>
        <div style="padding:4px 0;">👩 <strong>Jennifer</strong> — App monitor, co-pilot</div>
        <div style="padding:4px 0;">🧑 <strong>Jasper</strong> — Age 13, 4'9" — clears all rides</div>
        <div style="padding:4px 0;">👦 <strong>Sterling</strong> — Age 10, 4'6" — check heights on IOA day</div>
      </div>
    </div>
  </div>

  <!-- ═══════ DAYS TAB ═══════ -->
  <div class="tab-view" id="tab-days">
    <div id="days-container"></div>
  </div>

  <!-- ═══════ INFO TAB ═══════ -->
  <div class="tab-view" id="tab-info">
    <nav class="sub-nav" id="info-subnav"></nav>
    <div class="sub-view active" id="info-family"></div>
    <div class="sub-view" id="info-perks"></div>
    <div class="sub-view" id="info-heights"></div>
    <div class="sub-view" id="info-weather"></div>
  </div>

  <!-- ═══════ BOOKINGS TAB ═══════ -->
  <div class="tab-view" id="tab-bookings">
    <nav class="sub-nav" id="bookings-subnav"></nav>
    <div class="sub-view active" id="book-flights"></div>
    <div class="sub-view" id="book-hotels"></div>
    <div class="sub-view" id="book-tickets"></div>
    <div class="sub-view" id="book-dining"></div>
    <div class="sub-view" id="book-plants"></div>
    <div class="sub-view" id="book-costs"></div>
  </div>

  <!-- ═══════ TIPS TAB ═══════ -->
  <div class="tab-view" id="tab-tips">
    <nav class="sub-nav" id="tips-subnav"></nav>
    <div class="sub-view active" id="tips-tips"></div>
    <div class="sub-view" id="tips-actions"></div>
  </div>

</main>

<!-- Bottom Navigation -->
<nav id="bottom-nav">
  <button class="nav-btn active" data-tab="home" onclick="showTab('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    Home
  </button>
  <button class="nav-btn" data-tab="days" onclick="showTab('days')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    Days
  </button>
  <button class="nav-btn" data-tab="info" onclick="showTab('info')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    Info
  </button>
  <button class="nav-btn" data-tab="bookings" onclick="showTab('bookings')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/>
      <path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/>
      <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>
    </svg>
    Bookings
  </button>
  <button class="nav-btn" data-tab="tips" onclick="showTab('tips')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
      <line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    Tips
  </button>
</nav>

<div id="toast"></div>

<script src="data/content.js"></script>
<script>
// ── STATE ──────────────────────────────────────────────────
let currentTab = localStorage.getItem('ot-tab') || 'home';
const subState = {
  info: localStorage.getItem('ot-sub-info') || 'family',
  bookings: localStorage.getItem('ot-sub-bookings') || 'flights',
  tips: localStorage.getItem('ot-sub-tips') || 'tips'
};

// ── UTILS ──────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('Copied: ' + text));
}

function getDaysUntilTrip() {
  const now = new Date();
  const start = new Date(TRIP_DATA.meta.startDate);
  const end = new Date(TRIP_DATA.meta.endDate);
  now.setHours(0,0,0,0); start.setHours(0,0,0,0); end.setHours(0,0,0,0);
  const diff = Math.round((start - now) / 86400000);
  if (diff > 0) return { text: diff + ' day' + (diff === 1 ? '' : 's') + ' to go!', type: 'before' };
  if (diff === 0) return { text: 'Trip starts TODAY! 🎉', type: 'today' };
  const tripDay = Math.round((now - start) / 86400000) + 1;
  if (now <= end) return { text: 'Day ' + tripDay + ' of 5 — You\'re there! 🎢', type: 'during' };
  return { text: 'Trip complete — great memories! ⭐', type: 'after' };
}

function getCurrentDay() {
  const now = new Date(); now.setHours(0,0,0,0);
  return TRIP_DATA.itinerary.days.find(d => {
    const dd = new Date(d.date); dd.setHours(0,0,0,0);
    return dd.getTime() === now.getTime();
  });
}

function formatDate(iso) {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

// ── TAB SWITCHING ──────────────────────────────────────────
function showTab(name) {
  window.scrollTo(0, 0);
  document.querySelectorAll('.tab-view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelector('[data-tab="' + name + '"]').classList.add('active');
  currentTab = name;
  localStorage.setItem('ot-tab', name);
}

function showSub(tab, name) {
  const container = document.getElementById('tab-' + tab);
  container.querySelectorAll('.sub-view').forEach(el => el.classList.remove('active'));
  document.getElementById(tab.replace('bookings','book').replace('tips','tips') + '-' + name).classList.add('active');
  container.querySelectorAll('.sub-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.sub === name);
  });
  subState[tab] = name;
  localStorage.setItem('ot-sub-' + tab, name);
}

function buildSubNav(tab, items) {
  const nav = document.getElementById(tab + '-subnav');
  nav.innerHTML = items.map(([key, label]) =>
    `<button class="sub-btn${subState[tab] === key ? ' active' : ''}" data-sub="${key}" onclick="showSub('${tab}','${key}')">${label}</button>`
  ).join('');
}

    <div class="callout callout-info" style="margin-top:10px;font-size:13px;">
      🌿 = Vegan &nbsp;·&nbsp; 🥗 = Vegetarian &nbsp;·&nbsp; ⭐ = Jennifer's Picks

  // Costs

  const costLow = a.costTable.reduce((s,r) => s + r.low, 0);
  const costHigh = a.costTable.reduce((s,r) => s + r.high, 0);

// ── TIPS TAB ──────────────────────────────────────────────
function renderTips() {
  buildSubNav('tips', [['tips','💡 Tips'],['actions','✅ Checklist']]);

  // Tips
  document.getElementById('tips-tips').innerHTML =
    TRIP_DATA.tips.categories.map(cat => `
      <details>
        <summary><strong>${esc(cat.title)}</strong></summary>
        <div class="details-body">
          <ul class="tip-list">${cat.items.map(i=>`<li>${esc(i)}</li>`).join('')}</ul>
        </div>
      </details>`).join('');

  // Action Items
  renderActionItems();
}

function renderActionItems() {
  const saved = JSON.parse(localStorage.getItem('ot-checklist') || '{}');
  const todo = TRIP_DATA.actionItems.todo;
  const done = TRIP_DATA.actionItems.done;

  document.getElementById('tips-actions').innerHTML = `
    <div class="section-title">Before the Trip</div>
    <ul class="checklist" id="todo-list">
      ${todo.map(item => {
        const checked = !!saved[item.id];
        return `<li class="${checked?'done':''}">
          <input type="checkbox" class="check-input" id="${item.id}" ${checked?'checked':''} onchange="toggleCheck('${item.id}',this.checked)">
          <label class="check-label" for="${item.id}">${esc(item.text)}</label>
        </li>`;
      }).join('')}
    </ul>
    <div class="section-title" style="margin-top:14px;">Already Done ✅</div>
    <ul class="checklist">
      ${done.map(item => `
        <li class="done">
          <input type="checkbox" class="check-input" checked disabled>
          <label class="check-label">${esc(item.text)}</label>
        </li>`).join('')}
    </ul>`;
}

function toggleDayItem(date, i) {
  const done = JSON.parse(localStorage.getItem('ot-day-done') || '{}');
  const key = date + '-' + i;
  done[key] = !done[key];
  localStorage.setItem('ot-day-done', JSON.stringify(done));
  const items = document.querySelectorAll(`#tab-days .schedule-list li`);
  // find the specific li by re-rendering just its class
  renderDays();
}

function toggleCheck(id, checked) {
  const saved = JSON.parse(localStorage.getItem('ot-checklist') || '{}');
  saved[id] = checked;
  localStorage.setItem('ot-checklist', JSON.stringify(saved));
  const li = document.getElementById(id).closest('li');
  li.classList.toggle('done', checked);
}

// ── EXPENSE TRACKER ───────────────────────────────────────
function renderExpenses() {
  const list = document.getElementById('expense-list');
  if (!list) return;
  const expenses = JSON.parse(localStorage.getItem('ot-expenses') || '[]');
  const total = expenses.reduce((s, e) => s + e.amount, 0);
  if (expenses.length === 0) {
    list.innerHTML = `<div style="font-size:13px;color:var(--text2);padding:10px 0;">No expenses logged yet.</div>`;
    return;
  }
  list.innerHTML = `
    <div class="card" style="margin-bottom:8px;">
      ${expenses.map(e => `
        <div class="expense-item">
          <span class="expense-item-desc">${esc(e.desc)}</span>
          <span class="expense-item-amt">$${e.amount.toFixed(2)}</span>
          <button class="expense-del-btn" onclick="deleteExpense('${e.id}')" title="Remove">✕</button>
        </div>`).join('')}
      <div style="padding:10px 0 2px;border-top:2px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:13px;color:var(--text2);font-weight:600;">Total charged</span>
        <span class="expense-total">$${total.toFixed(2)}</span>
      </div>
    </div>`;
}

function addExpense() {
  const descEl = document.getElementById('exp-desc');
  const amtEl = document.getElementById('exp-amt');
  const desc = descEl.value.trim();
  const amount = parseFloat(amtEl.value);
  if (!desc || isNaN(amount) || amount <= 0) { showToast('Enter a description and amount'); return; }
  const expenses = JSON.parse(localStorage.getItem('ot-expenses') || '[]');
  expenses.push({ id: String(Date.now()), desc, amount });
  localStorage.setItem('ot-expenses', JSON.stringify(expenses));
  descEl.value = '';
  amtEl.value = '';
  renderExpenses();
}

function deleteExpense(id) {
  const expenses = JSON.parse(localStorage.getItem('ot-expenses') || '[]');
  localStorage.setItem('ot-expenses', JSON.stringify(expenses.filter(e => e.id !== id)));
  renderExpenses();
}

// ── INIT ──────────────────────────────────────────────────
function init() {
  renderHome();
  renderDays();
  renderInfo();
  renderBookings();
  renderTips();

  // Restore last-used tab and sub-tabs
  showTab(currentTab);
  if (subState.info !== 'family') showSub('info', subState.info);
  if (subState.bookings !== 'flights') showSub('bookings', subState.bookings);
  if (subState.tips !== 'tips') showSub('tips', subState.tips);

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/orlando-trip/sw.js', { scope: '/orlando-trip/' })
      .catch(() => {});
  }
}

window.addEventListener('DOMContentLoaded', init);
</script>
