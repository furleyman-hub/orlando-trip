<!DOCTYPE html>
<!-- v9 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#e63946">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Orlando Trip 2026</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg: #0f1923;
      --bg2: #1a2535;
      --bg3: #243040;
      --accent: #e63946;
      --gold: #f4a300;
      --green: #2ecc71;
      --yellow: #f39c12;
      --red: #e74c3c;
      --text: #f0f0f0;
      --text2: #b0b8c8;
      --border: #2d3f55;
      --nav-h: 64px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      min-height: 100dvh;
    }

    /* ── HEADER ── */
    #app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 52px;
    }
    #app-header h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    #app-header h1 span { color: var(--accent); }
    .header-badge {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      color: var(--text2);
    }

    /* ── MAIN CONTENT ── */
    #view-root {
      padding: 12px 14px calc(var(--nav-h) + var(--safe-bottom) + 12px);
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── BOTTOM NAV ── */
    #bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--safe-bottom);
      height: calc(var(--nav-h) + var(--safe-bottom));
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      color: var(--text2);
      font-size: 10px;
      font-weight: 500;
      padding: 6px 0;
      cursor: pointer;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
      min-height: 48px;
    }
    .nav-btn svg { width: 22px; height: 22px; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn.active svg path, .nav-btn.active svg rect, .nav-btn.active svg circle,
    .nav-btn.active svg polyline, .nav-btn.active svg polygon { stroke: var(--accent); }

    /* ── CARDS ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text2);
      margin-bottom: 8px;
    }

    /* ── SUB NAV ── */
    .sub-nav {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 10px 0 6px;
      margin-bottom: 4px;
      scrollbar-width: none;
    }
    .sub-nav::-webkit-scrollbar { display: none; }
    .sub-btn {
      flex-shrink: 0;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text2);
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
    }
    .sub-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── SECTION VISIBILITY ── */
    .tab-view { display: none; }
    .tab-view.active { display: block; }
    .sub-view { display: none; }
    .sub-view.active { display: block; }

    /* ── BADGES ── */
    .badge {
      display: inline-block;
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-ok { background: rgba(46,204,113,0.2); color: var(--green); border: 1px solid var(--green); }
    .badge-warn { background: rgba(243,156,18,0.2); color: var(--yellow); border: 1px solid var(--yellow); }
    .badge-danger { background: rgba(231,76,60,0.2); color: var(--red); border: 1px solid var(--red); }
    .badge-perk { background: rgba(244,163,0,0.2); color: var(--gold); border: 1px solid var(--gold); }
    .badge-conf { background: rgba(46,204,113,0.15); color: var(--green); border: 1px solid rgba(46,204,113,0.4); }
    .badge-gray { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }

    /* ── TABLES ── */
    .table-wrap { overflow-x: auto; margin: 8px 0; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 280px; }
    th {
      background: var(--bg3);
      color: var(--text2);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 8px 10px;
      text-align: left;
    }
    td { padding: 9px 10px; border-top: 1px solid var(--border); vertical-align: top; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* ── DETAIL ELEMENTS ── */
    details { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
    details[open] { background: var(--bg2); }
    summary {
      list-style: none;
      padding: 13px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-weight: 600;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    summary::-webkit-details-marker { display: none; }
    summary::after {
      content: "›";
      font-size: 18px;
      color: var(--text2);
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    details[open] summary::after { transform: rotate(90deg); }
    .details-body { padding: 0 14px 14px; }

    /* ── SCHEDULE LIST ── */
    .schedule-list { list-style: none; }
    .schedule-list li {
      display: flex;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .schedule-list li:last-child { border-bottom: none; }
    .schedule-time {
      flex-shrink: 0;
      width: 72px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 600;
      padding-top: 1px;
    }

    /* ── MUST-DOS ── */
    .must-do-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .must-do-chip {
      background: rgba(230,57,70,0.2);
      border: 1px solid rgba(230,57,70,0.5);
      color: #f08090;
      border-radius: 16px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .nice-chip {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 16px;
      padding: 3px 10px;
      font-size: 12px;
    }

    /* ── CALLOUT ── */
    .callout {
      border-radius: 8px;
      padding: 10px 12px;
      margin: 8px 0;
      font-size: 13px;
      line-height: 1.5;
    }
    .callout-warn { background: rgba(243,156,18,0.12); border-left: 3px solid var(--yellow); }
    .callout-danger { background: rgba(231,76,60,0.12); border-left: 3px solid var(--red); }
    .callout-info { background: rgba(52,152,219,0.12); border-left: 3px solid #3498db; }
    .callout-success { background: rgba(46,204,113,0.12); border-left: 3px solid var(--green); }

    /* ── CONF NUMBER ── */
    .conf-number {
      font-family: 'Courier New', monospace;
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 2px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .conf-copy-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      color: var(--text2);
      cursor: pointer;
      font-family: system-ui, sans-serif;
    }

    /* ── HOME TAB ── */
    .trip-hero {
      background: linear-gradient(135deg, #1a2535 0%, #0f1923 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 10px;
      text-align: center;
    }
    .trip-hero h2 { font-size: 20px; margin-bottom: 4px; }
    .trip-hero .trip-dates { color: var(--text2); font-size: 13px; margin-bottom: 12px; }
    .countdown-badge {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      border-radius: 24px;
      padding: 6px 18px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .quick-links {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }
    .quick-link-btn {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 6px;
      text-align: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .quick-link-btn .ql-icon { font-size: 22px; }
    .quick-link-btn:active { background: var(--bg3); }

    /* ── CHECKLIST ── */
    .checklist { list-style: none; }
    .checklist li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .checklist li:last-child { border-bottom: none; }
    .checklist li.done .check-label { text-decoration: line-through; color: var(--text2); opacity: 0.6; }
    .check-input {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: var(--accent);
      margin-top: 2px;
    }
    .check-label { font-size: 14px; line-height: 1.4; cursor: pointer; }

    /* ── FAMILY ── */
    .family-table td:first-child { font-weight: 600; white-space: nowrap; }
    .chill-rule {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .chill-rule:last-child { border-bottom: none; }
    .rule-num {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      background: var(--accent);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
    }
    .rule-title { font-weight: 700; margin-bottom: 2px; }

    /* ── PERKS TABLE ── */
    .perk-yes { color: var(--green); font-weight: 600; }
    .perk-no { color: var(--text2); }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #333;
      color: #fff;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── MISC ── */
    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin: 4px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    ul.tip-list { list-style: none; }
    ul.tip-list li {
      padding: 7px 0 7px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      position: relative;
      line-height: 1.4;
    }
    ul.tip-list li:last-child { border-bottom: none; }
    ul.tip-list li::before { content: "•"; position: absolute; left: 0; color: var(--accent); }
    .label-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .day-park { font-size: 12px; color: var(--text2); }
    .row-flex { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; }

    /* ── SCHEDULE DONE / NOW STATE ── */
    .schedule-done { text-decoration: line-through; opacity: 0.4; }
    .schedule-list li { cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
    .schedule-list li:active { background: rgba(255,255,255,0.04); border-radius: 4px; }

    /* ── DAY STRIP ── */
    .day-strip { display: flex; gap: 6px; padding: 8px 0 12px; overflow-x: auto; scrollbar-width: none; }
    .day-strip::-webkit-scrollbar { display: none; }
    .day-pill {
      flex: 1; min-width: 52px;
      background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text2); font-size: 13px; font-weight: 600;
      padding: 8px 4px; cursor: pointer; text-align: center; line-height: 1.4;
      -webkit-tap-highlight-color: transparent; transition: all 0.15s;
    }
    .day-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .day-pill.istoday { border-color: var(--accent); }

    /* ── CALENDAR TIMELINE ── */
    .cal-wrap { position: relative; overflow: hidden; padding-bottom: 20px; }
    .cal-timeline { position: relative; margin-left: 46px; margin-right: 4px; }
    .cal-hour-line {
      position: absolute; left: -46px; right: 0;
      display: flex; align-items: flex-start; pointer-events: none;
    }
    .cal-hour-label {
      width: 42px; font-size: 11px; color: var(--text2);
      text-align: right; padding-right: 8px; margin-top: -7px;
      flex-shrink: 0; letter-spacing: -0.2px;
    }
    .cal-hour-tick { flex: 1; border-top: 1px solid var(--border); }
    .cal-event {
      position: absolute; left: 6px; right: 0;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 10px 8px;
      min-height: 44px; border-left-width: 3px;
    }
    .cat-travel    { border-left-color: #3498db; }
    .cat-park      { border-left-color: var(--accent); }
    .cat-meal      { border-left-color: var(--gold); }
    .cat-hotel     { border-left-color: #9b59b6; }
    .cat-break     { border-left-color: var(--green); }
    .cat-logistics { border-left-color: var(--border); }
    .cal-event-time   { font-size: 11px; color: var(--gold); font-weight: 600; margin-bottom: 1px; }
    .cal-event-title  { font-size: 14px; font-weight: 700; line-height: 1.3; }
    .cal-event-detail { font-size: 12px; color: var(--text2); margin-top: 2px; line-height: 1.3; }
    .cal-now-line {
      position: absolute; left: -46px; right: 0;
      height: 2px; background: var(--accent); z-index: 10; pointer-events: none;
    }
    .cal-now-dot {
      position: absolute; left: -46px; width: 8px; height: 8px;
      background: var(--accent); border-radius: 50%; margin-top: -3px;
    }
    .cal-day-header {
      display: flex; align-items: center; gap: 10px;
      padding: 4px 0 12px; border-bottom: 1px solid var(--border); margin-bottom: 4px;
    }
    .cal-day-header h2 { font-size: 16px; font-weight: 700; }
    .cal-day-sub { font-size: 12px; color: var(--text2); }
    .schedule-now {
      background: rgba(230,57,70,0.08);
      border-radius: 6px;
      margin: 0 -4px;
      padding: 0 4px;
    }
    .schedule-now .schedule-time { color: var(--accent) !important; }
    .now-pip {
      flex-shrink: 0;
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      margin-top: 6px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── WEATHER FORECAST ── */
    .wx-day-row { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding: 4px 0 12px; }
    .wx-day-card { flex: 1; min-width: 58px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 8px 4px; text-align: center; }
    .wx-day-card.wx-today { border-color: var(--accent); }
    .wx-emoji { font-size: 22px; line-height: 1; }
    .wx-day-name { font-size: 11px; font-weight: 700; margin-top: 4px; }
    .wx-temps { font-size: 12px; margin-top: 2px; }
    .wx-rain { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .wx-bars { display: flex; align-items: flex-end; gap: 3px; height: 56px; }
    .wx-bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 2px; }
    .wx-bar-fill { width: 100%; background: #3498db; border-radius: 3px 3px 0 0; min-height: 3px; }
    .wx-bar-fill.rain-high { background: var(--accent); }
    .wx-bar-pct { font-size: 9px; color: var(--text2); }
    .wx-bar-lbl { font-size: 9px; color: var(--text2); }
    .wx-hour-title { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
    .pill-wx { display: block; font-size: 11px; margin-top: 2px; opacity: 0.9; }
    .wx-fetched { font-size: 11px; color: var(--text2); margin-top: 8px; }
    details.wx-detail > summary { list-style: none; cursor: pointer; }
    details.wx-detail > summary::-webkit-details-marker { display: none; }

    /* ── NOTES ── */
    #notes-area {
      width: 100%;
      min-height: 220px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      padding: 12px 14px;
      resize: vertical;
      outline: none;
    }
    #notes-area:focus { border-color: var(--accent); }
    .notes-meta { font-size: 12px; color: var(--text2); margin-top: 6px; display: flex; justify-content: space-between; align-items: center; }
    .notes-clear-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text2); font-size: 12px; padding: 3px 10px; cursor: pointer; }
    .notes-clear-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── PLANT FILTER ── */
    .filter-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .filter-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text2);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn.on { background: rgba(46,204,113,0.2); border-color: var(--green); color: var(--green); }

    /* ── EXPENSE TRACKER ── */
    .expense-input-row {
      display: flex;
      gap: 8px;
      margin: 10px 0;
      align-items: center;
    }
    .expense-input-row input[type="text"] {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
    }
    .expense-input-row input[type="text"]:focus { border-color: var(--accent); }
    .expense-amount-wrap {
      display: flex;
      align-items: center;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 10px;
      flex-shrink: 0;
      width: 100px;
    }
    .expense-amount-wrap span { color: var(--text2); font-size: 14px; margin-right: 2px; }
    .expense-amount-wrap input[type="number"] {
      background: none;
      border: none;
      color: var(--text);
      font-size: 14px;
      width: 70px;
      padding: 9px 0;
      outline: none;
    }
    .expense-add-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 9px 16px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .expense-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .expense-item:last-child { border-bottom: none; }
    .expense-item-desc { flex: 1; }
    .expense-item-amt { color: var(--gold); font-weight: 600; flex-shrink: 0; }
    .expense-del-btn {
      background: none;
      border: none;
      color: var(--text2);
      font-size: 16px;
      cursor: pointer;
      padding: 0 4px;
      flex-shrink: 0;
      line-height: 1;
    }
    .expense-del-btn:hover { color: var(--red); }
    .expense-total {
      font-size: 18px;

<script>
// ── STATE ──────────────────────────────────────────────────
let currentTab = localStorage.getItem('ot-tab') || 'home';
let veganOnly = false;
const subState = {
  info: localStorage.getItem('ot-sub-info') || 'family',
  bookings: localStorage.getItem('ot-sub-bookings') || 'flights',
  tips: localStorage.getItem('ot-sub-tips') || 'tips'
};

// ── UTILS ──────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('Copied: ' + text));
}

function getDaysUntilTrip() {
  const now = new Date();
  const start = new Date(TRIP_DATA.meta.startDate);
  const end = new Date(TRIP_DATA.meta.endDate);
  now.setHours(0,0,0,0); start.setHours(0,0,0,0); end.setHours(0,0,0,0);
  const diff = Math.round((start - now) / 86400000);
  if (diff > 0) return { text: diff + ' day' + (diff === 1 ? '' : 's') + ' to go!', type: 'before' };
  if (diff === 0) return { text: 'Trip starts TODAY! 🎉', type: 'today' };
  const tripDay = Math.round((now - start) / 86400000) + 1;
  if (now <= end) return { text: 'Day ' + tripDay + ' of 5 — You\'re there! 🎢', type: 'during' };
  return { text: 'Trip complete — great memories! ⭐', type: 'after' };
}

function getCurrentDay() {
  const now = new Date(); now.setHours(0,0,0,0);
  return TRIP_DATA.itinerary.days.find(d => {
    const dd = new Date(d.date); dd.setHours(0,0,0,0);
    return dd.getTime() === now.getTime();
  });
}

function parseScheduleTime(str) {
  const s = str.replace(/^~/, '').split('–')[0].split('—')[0].trim();
  const m = s.match(/^(\d{1,2})(?::(\d{2}))?\s*(am|pm)$/i);
  if (!m) return null;
  let h = parseInt(m[1]), min = m[2] ? parseInt(m[2]) : 0;
  const ap = m[3].toLowerCase();
  if (ap === 'pm' && h !== 12) h += 12;
  if (ap === 'am' && h === 12) h = 0;
  return h * 60 + min;
}

function getNowMinutes() {
  const n = new Date();
  return n.getHours() * 60 + n.getMinutes();
}

function formatDate(iso) {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

// ── TAB SWITCHING ──────────────────────────────────────────
function showTab(name) {
  window.scrollTo(0, 0);
  document.querySelectorAll('.tab-view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelector('[data-tab="' + name + '"]').classList.add('active');
  currentTab = name;
  localStorage.setItem('ot-tab', name);
}

function showSub(tab, name) {
  const container = document.getElementById('tab-' + tab);
  container.querySelectorAll('.sub-view').forEach(el => el.classList.remove('active'));
  document.getElementById(tab.replace('bookings','book').replace('tips','tips') + '-' + name).classList.add('active');
  container.querySelectorAll('.sub-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.sub === name);
  });
  subState[tab] = name;
  localStorage.setItem('ot-sub-' + tab, name);
}

function buildSubNav(tab, items) {
  const nav = document.getElementById(tab + '-subnav');
  nav.innerHTML = items.map(([key, label]) =>
    `<button class="sub-btn${subState[tab] === key ? ' active' : ''}" data-sub="${key}" onclick="showSub('${tab}','${key}')">${label}</button>`
  ).join('');
}

// ── HOME TAB ──────────────────────────────────────────────
function renderHome() {
  const cd = getDaysUntilTrip();
  document.getElementById('countdown-text').textContent = cd.text;

  document.getElementById('quick-links').innerHTML = [
    ['bookings','flights','🎫','Bookings'],
    ['info','heights','📏','Heights'],
    ['bookings','dining','🍽️','Dining'],
    ['info','weather','🌧️','Weather'],
    ['tips','tips','💡','Tips'],
    ['tips','actions','✅','Checklist']
  ].map(([tab,sub,icon,label]) =>
    `<button class="quick-link-btn" onclick="showTab('${tab}');showSub('${tab}','${sub}')">
      <span class="ql-icon">${icon}</span>${label}</button>`

  const today = getCurrentDay();
  const tc = document.getElementById('today-card');
  if (today) {
    tc.innerHTML = `
      <div class="card" style="border-color: var(--accent);">
        <div class="card-title">Today — ${esc(today.label)}</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:8px;">${formatDate(today.date)}</div>
        ${today.mustDos.length ? `<div style="margin-bottom:8px;"><strong style="font-size:12px;">Must-dos:</strong> ${today.mustDos.map(m=>`<span class="must-do-chip">${esc(m)}</span>`).join(' ')}</div>` : ''}
        ${today.schedule.length ? `<div class="schedule-list" style="margin-top:4px;">${today.schedule.slice(0,4).map(s=>`<div style="display:flex;gap:10px;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;"><span style="flex-shrink:0;width:72px;color:var(--gold);font-size:11px;font-weight:600;">${esc(s.time)}</span><span>${esc(s.activity)}</span></div>`).join('')}</div>` : ''}
      </div>`;
  } else {
    tc.innerHTML = `
      <div class="card">
        <div class="card-title">Trip Overview</div>
        <ul class="tip-list">
          <li>3 parks · 3 park days (Fri–Sun)</li>
          <li>Epic Universe — Friday, rope drop strategy</li>
          <li>Islands of Adventure — Saturday, Hard Rock perks</li>
          <li>Universal Studios Florida — Sunday, Express Pass all day</li>
          <li>Midday retreat every day: leave by 12:30, return by 2:30</li>
        </ul>
      </div>`;
  }
}

// ── DAYS TAB (CALENDAR) ───────────────────────────────────
const HOUR_PX = 80;
const DAY_LABELS = ['Thu','Fri','Sat','Sun','Mon'];
const DAY_DATES  = ['5/21','5/22','5/23','5/24','5/25'];
let calNowTimer = null;

function renderDays() {
  const days = TRIP_DATA.itinerary.days;
  const todayDate = new Date(); todayDate.setHours(0,0,0,0);
  let active = parseInt(localStorage.getItem('ot-cal-day') || '-1');
  days.forEach((d, i) => {
    const dd = new Date(d.date + 'T00:00:00'); dd.setHours(0,0,0,0);
    if (dd.getTime() === todayDate.getTime()) active = i;
  });
  if (active < 0) active = 0;

  document.getElementById('days-container').innerHTML = `
    <div class="day-strip" id="day-strip">
      ${days.map((d, i) => {
        const isToday = new Date(d.date+'T00:00:00').setHours(0,0,0,0) === todayDate.getTime();
        return `<button class="day-pill${i===active?' active':''}${isToday?' istoday':''}" onclick="switchDay(${i})">
          <span>${DAY_LABELS[i]}</span><br>
          <span style="font-size:10px;opacity:0.75;">${DAY_DATES[i]}</span>
        </button>`;
      }).join('')}
    </div>
    <div class="cal-wrap" id="cal-wrap">
      <div id="cal-day-header" class="cal-day-header"></div>
      <div class="cal-timeline" id="cal-timeline"></div>
    </div>`;

  renderTimeline(active);
  setupCalSwipe();
}

function switchDay(idx) {
  localStorage.setItem('ot-cal-day', idx);
  document.querySelectorAll('.day-pill').forEach((b, i) => b.classList.toggle('active', i === idx));
  renderTimeline(idx);
  window.scrollTo(0, 0);
}

function renderTimeline(idx) {
  const day    = TRIP_DATA.itinerary.days[idx];
  const events = (day.anchorEvents || []).slice().sort((a,b) => a.timeMin - b.timeMin);

  // Header
  const badges = [
    day.perks.epa          ? '<span class="badge badge-perk">EPA</span>' : '',
    day.perks.expressPass  ? '<span class="badge badge-perk">Express Pass</span>' : ''
  ].filter(Boolean).join(' ');
  document.getElementById('cal-day-header').innerHTML = `
    <span style="font-size:22px;">${day.parkEmoji}</span>
    <div style="flex:1;">
      <h2 style="font-size:16px;font-weight:700;">Day ${day.dayNumber} — ${esc(day.label)}</h2>
      <div class="cal-day-sub">${formatDate(day.date)}${day.park ? ' · ' + esc(day.park) : ''}</div>
    </div>
    ${badges}`;

  if (!events.length) {
    document.getElementById('cal-timeline').innerHTML = '<div style="padding:20px 0;color:var(--text2);">No events.</div>';
    return;
  }

  const startHour = Math.floor(Math.min(...events.map(e => e.timeMin)) / 60);
  const endHour   = Math.ceil(Math.max(...events.map(e => e.timeMin))  / 60) + 1;
  const tl = document.getElementById('cal-timeline');
  tl.style.height = ((endHour - startHour) * HOUR_PX) + 'px';

  let html = '';
  for (let h = startHour; h <= endHour; h++) {
    const top = (h - startHour) * HOUR_PX;
    const lbl = h < 12 ? h+'am' : h === 12 ? '12pm' : (h-12)+'pm';
    html += `<div class="cal-hour-line" style="top:${top}px;">
      <span class="cal-hour-label">${lbl}</span><div class="cal-hour-tick"></div></div>`;
  }

  // Place events, resolve overlaps
  const MIN_GAP = 54;
  let prevBottom = -999;
  events.forEach(e => {
    let top = Math.round((e.timeMin - startHour * 60) / 60 * HOUR_PX);
    if (top < prevBottom + 4) top = prevBottom + 4;
    prevBottom = top + MIN_GAP;
    const conf = e.confirmed ? ' <span class="badge badge-conf" style="font-size:10px;margin-left:4px;">✅</span>' : '';
    html += `<div class="cal-event cat-${e.category||'logistics'}" style="top:${top}px;">
      <div class="cal-event-time">${esc(e.time)}</div>
      <div class="cal-event-title">${e.emoji} ${esc(e.title)}${conf}</div>
      ${e.detail ? `<div class="cal-event-detail">${esc(e.detail)}</div>` : ''}
    </div>`;
  });

  // Current-time red line — today only
  const todayDate = new Date(); todayDate.setHours(0,0,0,0);
  const dayDate   = new Date(day.date+'T00:00:00'); dayDate.setHours(0,0,0,0);
  if (dayDate.getTime() === todayDate.getTime()) {
    html += `<div class="cal-now-line" id="cal-now-line" style="top:0px;"></div>
             <div class="cal-now-dot"  id="cal-now-dot"  style="top:0px;"></div>`;
    clearInterval(calNowTimer);
    const drawNow = () => {
      const n = new Date(), nowMin = n.getHours()*60 + n.getMinutes();
      const top = Math.round((nowMin - startHour*60) / 60 * HOUR_PX);
      const el = document.getElementById('cal-now-line');
      const dot = document.getElementById('cal-now-dot');
      if (el)  el.style.top  = top + 'px';
      if (dot) dot.style.top = top + 'px';
    };
    tl.innerHTML = html;
    setTimeout(drawNow, 0);
    calNowTimer = setInterval(drawNow, 60000);
    return;
  }

  tl.innerHTML = html;
}

function setupCalSwipe() {
  const wrap = document.getElementById('cal-wrap');
  if (!wrap || wrap._swipeSet) return;
  wrap._swipeSet = true;
  let sx = 0, sy = 0;
  wrap.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, { passive: true });
  wrap.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - sx;
    const dy = Math.abs(e.changedTouches[0].clientY - sy);
    if (Math.abs(dx) > 55 && dy < 50) {
      const cur  = parseInt(localStorage.getItem('ot-cal-day') || '0');
      const next = dx < 0 ? Math.min(cur+1, 4) : Math.max(cur-1, 0);
      if (next !== cur) switchDay(next);
    }
  }, { passive: true });
}

            <ul class="schedule-list">

            ${day.park === 'Islands of Adventure' ? `
              <div class="must-do-row">
                <button class="nice-chip" style="border:none;cursor:pointer;background:rgba(52,152,219,0.15);color:#5dade2;border:1px solid rgba(52,152,219,0.4);" onclick="event.stopPropagation();showTab('info');showSub('info','heights')">📏 Check Heights</button>
              </div>` : ''}
            ${day.dining ? `
              <div class="callout callout-success" style="margin-top:10px;">
                🍽️ <strong>${esc(day.dining.name)}</strong> · ${esc(day.dining.time)} · ${esc(day.dining.location)}
                ${day.dining.confirmed ? ' ✅' : ''}
              </div>` : ''}
          </div>
        </details>`;
    }).join('');
}

function payBadge(status) {
  if (status === 'paid') return '<span class="badge badge-ok" style="margin-left:8px;">✅ Paid</span>';
  if (status === 'pending') return '<span class="badge badge-warn" style="margin-left:8px;">⏳ Pending</span>';
  if (status === 'verify') return '<span class="badge badge-danger" style="margin-left:8px;">🔍 Verify</span>';
  return '';
}

        return `<li class="${checked?'done':''}">

}

function toggleDayItem(date, i) {
  const done = JSON.parse(localStorage.getItem('ot-day-done') || '{}');
  const key = date + '-' + i;
  done[key] = !done[key];
  localStorage.setItem('ot-day-done', JSON.stringify(done));
  const items = document.querySelectorAll(`#tab-days .schedule-list li`);
  // find the specific li by re-rendering just its class
  renderDays();
}

function toggleCheck(id, checked) {
  const saved = JSON.parse(localStorage.getItem('ot-checklist') || '{}');
  saved[id] = checked;
  localStorage.setItem('ot-checklist', JSON.stringify(saved));
  const li = document.getElementById(id).closest('li');
  li.classList.toggle('done', checked);
}

                        </div>
                      </div>`).join('')}
                  </div>`).join('')}
              </div>`).join('')}
          </div>
        </details>`;
    }).join('')}
    <div class="callout callout-info" style="margin-top:10px;font-size:13px;">
      🌿 = Vegan &nbsp;·&nbsp; 🥗 = Vegetarian &nbsp;·&nbsp; ⭐ = Jennifer's Picks
    </div>`;
}

function toggleVeganFilter() {
  veganOnly = !veganOnly;
  renderPlantBased();
}

// ── PACKING ────────────────────────────────────────────────
function renderPacking() {
  const pk = TRIP_DATA.packing;
  const today = getCurrentDay();
  const dateKey = today ? today.date : new Date().toISOString().slice(0,10);
  const saved = JSON.parse(localStorage.getItem('ot-pack-' + dateKey) || '{}');

  const parkItems = today && today.park && pk.byPark[today.park] ? pk.byPark[today.park] : [];
  const allItems = [...pk.always, ...parkItems];
  const checked = allItems.filter(i => saved[i.id]).length;

  const parkLabel = today && today.park
    ? `<div class="callout callout-info" style="margin-bottom:10px;">Today's park: <strong>${esc(today.park)}</strong> — ${parkItems.length > 0 ? parkItems.length + ' extra item' + (parkItems.length > 1 ? 's' : '') + ' added below' : 'no extras today'}</div>`
    : `<div class="callout callout-info" style="margin-bottom:10px;">Not a park day — showing base checklist</div>`;

  document.getElementById('tips-pack').innerHTML = `
    <div class="section-title">Before You Leave</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:8px;">${esc(pk.note)}</p>
    ${parkLabel}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <span style="font-size:13px;color:var(--text2);">${checked} / ${allItems.length} packed</span>
      <button class="notes-clear-btn" onclick="clearPacking('${dateKey}')">Reset</button>
    </div>
    <ul class="checklist" id="pack-list">
      ${allItems.map(item => {
        const isChecked = !!saved[item.id];
        const isParkSpecific = parkItems.some(p => p.id === item.id);
        return `<li class="${isChecked ? 'done' : ''}">
          <input type="checkbox" class="check-input" id="${item.id}" ${isChecked ? 'checked' : ''} onchange="togglePack('${dateKey}','${item.id}',this.checked)">
          <label class="check-label" for="${item.id}">${esc(item.text)}${isParkSpecific ? ' <span style="font-size:11px;color:var(--gold);font-weight:700;">★ today</span>' : ''}</label>
        </li>`;
      }).join('')}
    </ul>`;
}

function togglePack(dateKey, id, checked) {
  const saved = JSON.parse(localStorage.getItem('ot-pack-' + dateKey) || '{}');
  saved[id] = checked;
  localStorage.setItem('ot-pack-' + dateKey, JSON.stringify(saved));
  const li = document.getElementById(id).closest('li');
  li.classList.toggle('done', checked);
  renderPacking();
}

function clearPacking(dateKey) {
  localStorage.removeItem('ot-pack-' + dateKey);
  renderPacking();
}

// ── SHOWS ───────────────────────────────────────────────────
function renderShows() {
  const s = TRIP_DATA.shows;
  const today = getCurrentDay();

  // Put today's park first if we're on a trip day
  const parks = [...s.byPark];
  if (today && today.park) {
    const idx = parks.findIndex(p => p.park === today.park || p.day.includes(today.park));
    if (idx > 0) { const [cur] = parks.splice(idx, 1); parks.unshift(cur); }
  }

  document.getElementById('tips-shows').innerHTML = `
    <div class="callout callout-info" style="margin-bottom:10px;">${esc(s.tip)}</div>
    ${parks.map((p, i) => `
      <details ${i === 0 ? 'open' : ''}>
        <summary>
          <div class="label-row">
            <span style="font-size:18px;">${p.emoji}</span>
            <div>
              <div style="font-weight:700;">${esc(p.park)}</div>
              <div class="day-park">${esc(p.day)}</div>
            </div>
            ${today && today.park === p.park ? '<span class="badge badge-ok">TODAY</span>' : ''}
          </div>
        </summary>
        <div class="details-body">
          ${p.note ? `<div class="callout callout-warn" style="margin-bottom:10px;">${esc(p.note)}</div>` : ''}
          ${p.shows.map(show => `
            <div class="card" style="margin-bottom:8px;">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;">
                <div style="font-weight:700;font-size:15px;">${esc(show.name)}</div>
                <span class="badge badge-gray" style="white-space:nowrap;">${esc(show.duration)}</span>
              </div>
              <div style="font-size:12px;color:var(--gold);margin-bottom:4px;">🕐 ${esc(show.times)}</div>
              <div style="font-size:13px;color:var(--text2);">${esc(show.tip)}</div>
            </div>`).join('')}
        </div>
      </details>`).join('')}`;
}

// ── NOTES ──────────────────────────────────────────────────
function renderNotes() {
  const saved = localStorage.getItem('ot-notes') || '';
  const count = saved.trim().length;
  document.getElementById('tips-notes').innerHTML = `
    <div class="section-title">Quick Notes</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:8px;">Jot anything down — locker numbers, parking spot, ride opinions, packing reminders. Saves automatically.</p>
    <textarea id="notes-area" placeholder="e.g. Parking Level 4 · Locker #23 · Sterling wants Hufflepuff wand…" oninput="saveNotes()">${esc(saved)}</textarea>
    <div class="notes-meta">
      <span id="notes-count">${count > 0 ? count + ' characters' : 'Empty'}</span>
      <button class="notes-clear-btn" onclick="clearNotes()">Clear</button>
    </div>`;
}

let _notesSaveTimer;
function saveNotes() {
  clearTimeout(_notesSaveTimer);
  _notesSaveTimer = setTimeout(() => {
    const val = document.getElementById('notes-area').value;
    localStorage.setItem('ot-notes', val);
    const el = document.getElementById('notes-count');
    if (el) el.textContent = val.trim().length > 0 ? val.trim().length + ' characters' : 'Empty';
  }, 400);
}

function clearNotes() {
  if (!confirm('Clear all notes?')) return;
  localStorage.removeItem('ot-notes');
  renderNotes();
}

// ── EXPENSE TRACKER ───────────────────────────────────────
function renderExpenses() {
  const list = document.getElementById('expense-list');
  if (!list) return;
  const expenses = JSON.parse(localStorage.getItem('ot-expenses') || '[]');
  const total = expenses.reduce((s, e) => s + e.amount, 0);
  if (expenses.length === 0) {
    list.innerHTML = `<div style="font-size:13px;color:var(--text2);padding:10px 0;">No expenses logged yet.</div>`;
    return;
  }
  list.innerHTML = `
    <div class="card" style="margin-bottom:8px;">
      ${expenses.map(e => `
        <div class="expense-item">
          <span class="expense-item-desc">${esc(e.desc)}</span>
          <span class="expense-item-amt">$${e.amount.toFixed(2)}</span>
          <button class="expense-del-btn" onclick="deleteExpense('${e.id}')" title="Remove">✕</button>
        </div>`).join('')}
      <div style="padding:10px 0 2px;border-top:2px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:13px;color:var(--text2);font-weight:600;">Total charged</span>
        <span class="expense-total">$${total.toFixed(2)}</span>
      </div>
    </div>`;
}

function addExpense() {
  const descEl = document.getElementById('exp-desc');
  const amtEl = document.getElementById('exp-amt');
  const desc = descEl.value.trim();
  const amount = parseFloat(amtEl.value);
  if (!desc || isNaN(amount) || amount <= 0) { showToast('Enter a description and amount'); return; }
  const expenses = JSON.parse(localStorage.getItem('ot-expenses') || '[]');
  expenses.push({ id: String(Date.now()), desc, amount });
  localStorage.setItem('ot-expenses', JSON.stringify(expenses));
  descEl.value = '';
  amtEl.value = '';
  renderExpenses();
}

function deleteExpense(id) {
  const expenses = JSON.parse(localStorage.getItem('ot-expenses') || '[]');
  localStorage.setItem('ot-expenses', JSON.stringify(expenses.filter(e => e.id !== id)));
  renderExpenses();
}

// ── WEATHER ───────────────────────────────────────────────
function wxEmoji(code) {
  if (code === 0)  return '☀️';
  if (code <= 2)   return '🌤️';
  if (code <= 3)   return '⛅';
  if (code <= 48)  return '🌫️';
  if (code <= 67)  return '🌧️';
  if (code <= 77)  return '❄️';
  if (code <= 82)  return '🌦️';
  return '⛈️';
}

const WX_TTL = 3 * 60 * 60 * 1000; // 3 hours

async function fetchWeather() {
  const cached = JSON.parse(localStorage.getItem('ot-weather') || 'null');
  if (cached && (Date.now() - cached.ts) < WX_TTL) { applyWeatherToUI(cached); return; }

  const url = 'https://api.open-meteo.com/v1/forecast?latitude=28.4688&longitude=-81.4631' +
    '&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max' +
    '&hourly=precipitation_probability&temperature_unit=fahrenheit' +
    '&timezone=America%2FNew_York&start_date=2026-05-21&end_date=2026-05-25';
  try {
    const res  = await fetch(url);
    const json = await res.json();
    const days = json.daily.time.map((date, i) => ({
      date,
      code:    json.daily.weathercode[i],
      emoji:   wxEmoji(json.daily.weathercode[i]),
      high:    Math.round(json.daily.temperature_2m_max[i]),
      low:     Math.round(json.daily.temperature_2m_min[i]),
      rainPct: json.daily.precipitation_probability_max[i] ?? 0,
      hourly:  [12,13,14,15,16,17,18,19,20].map(h => ({
        hour:  h,
        label: h === 12 ? '12p' : (h - 12) + 'p',
        rain:  json.hourly.precipitation_probability[i * 24 + h] ?? 0
      }))
    }));
    const data = { ts: Date.now(), days };
    localStorage.setItem('ot-weather', JSON.stringify(data));
    applyWeatherToUI(data);
  } catch(e) { /* fail silently — static tips still visible */ }
}

function applyWeatherToUI(data) {
  // 1. Update day pills with emoji + high temp
  document.querySelectorAll('.day-pill').forEach((pill, i) => {
    if (!data.days[i]) return;
    const d = data.days[i];
    let span = pill.querySelector('.pill-wx');
    if (!span) { span = document.createElement('span'); span.className = 'pill-wx'; pill.appendChild(span); }
    span.textContent = d.emoji + ' ' + d.high + '°';
  });

  // 2. Build and prepend live forecast block in Info → Weather
  const todayDate = new Date(); todayDate.setHours(0,0,0,0);
  const fetched   = new Date(data.ts).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});

  const dayCards = data.days.map((d, i) => {
    const isToday = new Date(d.date + 'T00:00:00').setHours(0,0,0,0) === todayDate.getTime();
    return `<div class="wx-day-card${isToday ? ' wx-today' : ''}">
      <div class="wx-emoji">${d.emoji}</div>
      <div class="wx-day-name">${DAY_LABELS[i]}</div>
      <div class="wx-temps">${d.high}°/${d.low}°</div>
      <div class="wx-rain">☔${d.rainPct}%</div>
    </div>`;
  }).join('');

  const detailCards = data.days.map((d, i) => {
    const isToday = new Date(d.date + 'T00:00:00').setHours(0,0,0,0) === todayDate.getTime();
    const bars = d.hourly.map(h => `
      <div class="wx-bar-col">
        <span class="wx-bar-pct">${h.rain > 0 ? h.rain + '%' : ''}</span>
        <div class="wx-bar-fill${h.rain >= 60 ? ' rain-high' : ''}" style="height:${Math.max(3, h.rain * 0.52)}px"></div>
        <span class="wx-bar-lbl">${h.label}</span>
      </div>`).join('');
    return `<details class="wx-detail" style="margin-bottom:6px;">
      <summary>
        <div class="wx-day-card${isToday ? ' wx-today' : ''}" style="text-align:left;display:flex;align-items:center;gap:10px;padding:8px 12px;">
          <span style="font-size:20px;">${d.emoji}</span>
          <span style="font-weight:700;">${DAY_LABELS[i]} ${DAY_DATES[i]}</span>
          <span style="color:var(--text2);font-size:13px;">${d.high}°/${d.low}° · ☔${d.rainPct}%</span>
          <span style="margin-left:auto;color:var(--text2);font-size:12px;">▸ detail</span>
        </div>
      </summary>
      <div style="padding:8px 4px 4px;">
        <div class="wx-hour-title">Afternoon rain chance (12p – 8p)</div>
        <div class="wx-bars">${bars}</div>
      </div>
    </details>`;
  }).join('');

  const liveBlock = `<div class="wx-live-block" style="margin-bottom:16px;">
    <div class="section-title" style="margin-bottom:8px;">📡 Live Forecast — Universal Orlando</div>
    <div class="wx-day-row">${dayCards}</div>
    <div class="wx-hour-title" style="font-weight:600;margin:4px 0 8px;">Afternoon rain detail — tap a day to expand</div>
    ${detailCards}
    <div class="wx-fetched">Updated ${fetched}</div>
  </div>`;

  const el = document.getElementById('info-weather');
  const existing = el.querySelector('.wx-live-block');
  if (existing) existing.outerHTML = liveBlock;
  else el.insertAdjacentHTML('afterbegin', liveBlock);
}

// ── INIT ──────────────────────────────────────────────────
function init() {
  renderHome();
  renderDays();
  renderInfo();
  renderBookings();
  renderTips();

  // Restore last-used tab and sub-tabs
  showTab(currentTab);
  if (subState.info !== 'family') showSub('info', subState.info);
  if (subState.bookings !== 'flights') showSub('bookings', subState.bookings);
  if (subState.tips !== 'tips') showSub('tips', subState.tips);

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/orlando-trip/sw.js', { scope: '/orlando-trip/' })
      .catch(() => {});
  }

  // Fetch live weather forecast (async, updates UI when ready)
  fetchWeather();
}

window.addEventListener('DOMContentLoaded', init);
</script>
